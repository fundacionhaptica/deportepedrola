<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deporte Pedrola — ERP</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>

  <!-- Estado inicial: cargando -->
  <div id="auth-loading" class="auth-loading">
    <div class="spinner" style="width:32px;height:32px;border-width:3px;border-top-color:var(--primary);border-color:var(--border);border-top-color:var(--primary)"></div>
    <span style="color:var(--muted)">Cargando…</span>
  </div>

  <!-- Login (se muestra si no autenticado) -->
  <div id="login-page" style="display:none" class="login-page">
    <div class="login-card">
      <div class="login-logo">⚽</div>
      <h1>Deporte Pedrola</h1>
      <p>Área de gestión interna del club</p>
      <button id="btn-login" class="btn btn-primary">Iniciar sesión</button>
    </div>
  </div>

  <!-- App shell (se muestra si autenticado) -->
  <div id="app-shell" style="display:none">
    <header>
      <a class="brand" href="#dashboard">
        <div class="brand-logo">DP</div>
        Deporte Pedrola
      </a>
      <nav id="main-nav">
        <a href="#dashboard">Dashboard</a>
        <a href="#socios">Socios</a>
        <a href="#facturas">Facturas</a>
        <a href="#ingresos">Ingresos</a>
        <a href="#estructura">Estructura</a>
      </nav>
      <div class="header-user">
        <span id="user-name"></span>
        <button id="btn-logout" class="btn-sm-header">Salir</button>
      </div>
    </header>
    <main>
      <div id="app"></div>
    </main>
  </div>

  <!-- CDN Auth0 (debe cargar antes del módulo ES) -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <!-- CDN Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <!-- App -->
  <script type="module" src="/js/app.js"></script>

</body>
</html>
