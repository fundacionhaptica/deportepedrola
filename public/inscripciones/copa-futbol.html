<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Copa Fútbol · CDE Deporte Pedrola</title>
  <link rel="stylesheet" href="/inscripciones/style.css">
</head>
<body>

<header>
  <div class="logo">CDE</div>
  <h1>Inscripciones <small>CDE Deporte Pedrola</small></h1>
</header>

<div class="wrap">
  <div class="event-hero">
    <div class="icono">🏆</div>
    <h2>Copa Fútbol</h2>
    <div class="precio">30 € <small>por equipo</small></div>
    <p class="desc">Torneo de fútbol organizado por el Club Deportivo Elemental Deporte Pedrola.</p>
  </div>

  <div class="card">
    <div class="campo">
      <label>Nombre del equipo</label>
      <input type="text" id="nombre" placeholder="Nombre de tu equipo">
    </div>
    <div class="campo">
      <label>Nombre del delegado / responsable</label>
      <input type="text" id="delegado" placeholder="Nombre y apellidos">
    </div>
    <div class="campo">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="campo">
      <label>Teléfono de contacto</label>
      <input type="tel" id="telefono" placeholder="612 345 678">
    </div>
    <div class="campo">
      <label>Categoría</label>
      <select id="categoria">
        <option>Benjamín</option>
        <option>Alevín</option>
        <option>Infantil</option>
        <option>Cadete</option>
        <option>Juvenil</option>
        <option>Senior</option>
      </select>
    </div>

    <div class="aviso" id="aviso"></div>
    <button class="btn-pagar" id="btnPagar" data-label="Inscribir equipo — 30 €">Inscribir equipo — 30 €</button>
  </div>
</div>

<footer>
  <a href="/inscripciones">← Todos los eventos</a>
</footer>

<script src="/inscripciones/inscripciones.js"></script>
<script>
  document.getElementById('btnPagar').addEventListener('click', function () {
    var equipo   = document.getElementById('nombre').value.trim();
    var delegado = document.getElementById('delegado').value.trim();
    var email    = document.getElementById('email').value.trim();
    if (!equipo || !delegado || !email) {
      mostrarAviso('err', 'Nombre del equipo, delegado y correo son obligatorios.');
      return;
    }
    checkout({
      evento: 'copa-futbol',
      nombre: equipo + ' — ' + delegado,
      email: email,
      meta: {
        equipo: equipo,
        delegado: delegado,
        telefono: document.getElementById('telefono').value.trim(),
        categoria: document.getElementById('categoria').value,
      },
    });
  });
</script>
</body>
</html>
