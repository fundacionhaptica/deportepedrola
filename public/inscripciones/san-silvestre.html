<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>San Silvestre · CDE Deporte Pedrola</title>
  <link rel="stylesheet" href="/inscripciones/style.css">
</head>
<body>

<header>
  <div class="logo">CDE</div>
  <h1>Inscripciones <small>CDE Deporte Pedrola</small></h1>
</header>

<div class="wrap">
  <div class="event-hero">
    <div class="icono">🎉</div>
    <h2>San Silvestre</h2>
    <div class="precio" style="color:var(--amarillo)">Gratuita <small>sin coste de inscripción</small></div>
    <p class="desc">Carrera popular de fin de año organizada por el CDE Deporte Pedrola. ¡Toda la familia bienvenida!</p>
  </div>

  <div class="card">
    <div class="campo">
      <label>Nombre completo</label>
      <input type="text" id="nombre" placeholder="Nombre y apellidos" autocomplete="name">
    </div>
    <div class="campo">
      <label>Correo electrónico</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="campo">
      <label>Teléfono</label>
      <input type="tel" id="telefono" placeholder="612 345 678">
    </div>
    <div class="campo">
      <label>Categoría</label>
      <select id="categoria">
        <option value="infantil">Infantil (hasta 12 años)</option>
        <option value="juvenil">Juvenil (13–17 años)</option>
        <option value="adulto" selected>Adulto (18+)</option>
        <option value="senior">Sénior (+60)</option>
      </select>
    </div>

    <div class="aviso" id="aviso"></div>
    <button class="btn-pagar btn-gratis" id="btnPagar" data-label="Inscribirme gratis">Inscribirme gratis</button>
  </div>
</div>

<footer>
  <a href="/inscripciones">← Todos los eventos</a>
</footer>

<script src="/inscripciones/inscripciones.js"></script>
<script>
  document.getElementById('btnPagar').addEventListener('click', function () {
    var nombre = document.getElementById('nombre').value.trim();
    var email  = document.getElementById('email').value.trim();
    if (!nombre || !email) {
      mostrarAviso('err', 'Nombre y correo son obligatorios.');
      return;
    }
    checkout({
      evento: 'san-silvestre',
      nombre: nombre,
      email: email,
      meta: {
        telefono: document.getElementById('telefono').value.trim(),
        categoria: document.getElementById('categoria').value,
      },
    });
  });
</script>
</body>
</html>
