<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pago completado · CDE Deporte Pedrola</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f4f4f4; color: #111; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border: 1px solid #e0e0e0; border-radius: 8px;
      padding: 2.5rem 2rem; text-align: center; max-width: 420px; width: 100%;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }
    .icono { font-size: 3.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.4rem; margin-bottom: .6rem; }
    p { color: #555; font-size: .9rem; margin-bottom: 1.8rem; line-height: 1.6; }
    .btn {
      display: inline-block; background: #FFD400; color: #111;
      font-weight: 700; padding: .65rem 1.6rem; border-radius: 5px;
      text-decoration: none; font-size: .95rem; transition: opacity .15s;
    }
    .btn:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icono">✅</div>
    <h1>Pago realizado correctamente</h1>
    <p>Tu pago se ha procesado. Recibirás confirmación por correo electrónico en breve.</p>
    <a class="btn" href="/">Volver al panel</a>
  </div>
</body>
</html>
