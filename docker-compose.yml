services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "3010:3000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - deporte-net

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: deporte_pedrola
      POSTGRES_USER: deporte
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - deporte-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deporte -d deporte_pedrola"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - deporte-net

volumes:
  deporte-db-data:

networks:
  deporte-net:
    driver: bridge
