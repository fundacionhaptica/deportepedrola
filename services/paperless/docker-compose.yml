name: club-paperless

services:
  db:
    image: postgres:16-alpine
    container_name: club-paperless-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: paperless
      POSTGRES_USER: paperless
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /volume1/docker/club/paperless/db-data:/var/lib/postgresql/data
    networks:
      - club-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperless"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: club-paperless-redis
    restart: unless-stopped
    networks:
      - club-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: club-paperless-web
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8010:8000"
    volumes:
      - /volume1/docker/club/paperless/data:/usr/src/paperless/data
      - /volume1/docker/club/paperless/media:/usr/src/paperless/media
      - /volume1/docker/club/paperless/export:/usr/src/paperless/export
      - /volume1/docker/club/paperless/consume:/usr/src/paperless/consume
      - /volume1/docker/club/paperless/trash:/usr/src/paperless/trash
    environment:
      USERMAP_UID: ${USERMAP_UID}
      USERMAP_GID: ${USERMAP_GID}
      PAPERLESS_REDIS: redis://redis:6379
      PAPERLESS_DBHOST: db
      PAPERLESS_DBNAME: paperless
      PAPERLESS_DBUSER: paperless
      PAPERLESS_DBPASS: ${POSTGRES_PASSWORD}
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_TIME_ZONE: Europe/Madrid
      PAPERLESS_OCR_LANGUAGES: spa
      PAPERLESS_OCR_LANGUAGE: spa
      PAPERLESS_ADMIN_USER: ${PAPERLESS_ADMIN_USER:-}
      PAPERLESS_URL: https://contabilidad.deportepedrola.com
      PAPERLESS_ALLOWED_HOSTS: contabilidad.deportepedrola.com,localhost
      PAPERLESS_CORS_ALLOWED_HOSTS: https://contabilidad.deportepedrola.com
      PAPERLESS_CSRF_TRUSTED_ORIGINS: https://contabilidad.deportepedrola.com
      PAPERLESS_USE_X_FORWARD_HOST: "true"
      PAPERLESS_USE_X_FORWARD_PORT: "true"
      PAPERLESS_PROXY_SSL_HEADER: '["HTTP_X_FORWARDED_PROTO", "https"]'
      PAPERLESS_TRASH_DIR: /usr/src/paperless/trash
      PAPERLESS_EMPTY_TRASH_DELAY: 30
      PAPERLESS_CONSUMER_POLLING: 30
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_CONSUMER_SUBDIRS_AS_TAGS: "false"
      PAPERLESS_FILENAME_FORMAT: "{created_year}/{correspondent}/{title}"
    networks:
      - club-network
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  club-network:
    external: true
