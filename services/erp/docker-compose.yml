services:
  erp-db:
    image: mariadb:11
    container_name: club-erp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - /volume1/docker/club/erp/db:/var/lib/mysql
    networks:
      - club-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  erp:
    image: dolibarr/dolibarr:21
    container_name: club-erp-web
    restart: unless-stopped
    depends_on:
      erp-db:
        condition: service_healthy
    environment:
      DOLI_DB_TYPE: mysqli
      DOLI_DB_HOST: erp-db
      DOLI_DB_HOST_PORT: "3306"
      DOLI_DB_NAME: ${MYSQL_DATABASE}
      DOLI_DB_USER: ${MYSQL_USER}
      DOLI_DB_PASSWORD: ${MYSQL_PASSWORD}
      DOLI_ADMIN_LOGIN: ${DOLI_ADMIN_LOGIN}
      DOLI_ADMIN_PASSWORD: ${DOLI_ADMIN_PASSWORD}
      DOLI_INSTALL_AUTO: ${DOLI_INSTALL_AUTO:-1}
      DOLI_URL_ROOT: https://erp.deportepedrola.com
      DOLI_COMPANY_NAME: "Club Deportivo Elemental Deporte Pedrola"
      DOLI_COMPANY_COUNTRYCODE: ES
      DOLI_MODULES: >-
        modAccounting,
        modFournisseur,
        modFacture,
        modBanque,
        modAdherent,
        modDon,
        modExpenseReport,
        modCategorie,
        modExport,
        modImport
      PHP_INI_DATE_TIMEZONE: Europe/Madrid
    volumes:
      - /volume1/docker/club/erp/html/custom:/var/www/html/custom
      - /volume1/docker/club/erp/html/conf:/var/www/html/conf
      - /volume1/docker/club/erp/documents:/var/www/documents
    networks:
      - club-network
    ports:
      - "127.0.0.1:8085:80"

networks:
  club-network:
    external: true
