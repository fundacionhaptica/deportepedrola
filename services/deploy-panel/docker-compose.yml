name: club-deploy-panel

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: club-deploy-panel
    restart: unless-stopped
    ports:
      - "8030:8000"
    env_file: .env
    volumes:
      - /volume1/docker/club/secrets/deploy_key:/run/secrets/deploy_key:ro
      - /volume1/docker/club/secrets/known_hosts:/run/secrets/known_hosts:ro
      - /volume1/docker/club/logs:/logs
    networks:
      - club-network

networks:
  club-network:
    external: true
