name: Validar repositorio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Compose, secretos, scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1. Detectar .env reales comiteados accidentalmente.
      #    Solo se permiten .env.example.
      # ---------------------------------------------------------------
      - name: Verificar que no hay .env reales en el repo
        run: |
          set -euo pipefail
          # Buscar todo fichero .env (cualquier ubicación) que NO sea .env.example.
          # Usamos `git ls-files` para ignorar lo que esté en .gitignore.
          mapfile -t leaks < <(git ls-files | grep -E '(^|/)\.env$|(^|/).+\.env$' | grep -v '\.env\.example$' || true)
          if (( ${#leaks[@]} > 0 )); then
            echo "::error::Se han encontrado ficheros .env reales en el repo:"
            for f in "${leaks[@]}"; do
              echo "::error::  - $f"
            done
            echo "::error::Mover los secretos al NAS y dejar solo .env.example aquí."
            exit 1
          fi
          echo "OK: no hay .env reales versionados."

      # ---------------------------------------------------------------
      # 2. Cada services/<x>/ debe tener un .env.example.
      # ---------------------------------------------------------------
      - name: Verificar que cada servicio tiene .env.example
        run: |
          set -euo pipefail
          missing=0
          for svc in services/*/; do
            if [[ ! -f "${svc}.env.example" ]]; then
              echo "::error::Falta .env.example en ${svc}"
              missing=$((missing+1))
            fi
          done
          if (( missing > 0 )); then
            exit 1
          fi
          echo "OK: todos los servicios tienen .env.example."

      # ---------------------------------------------------------------
      # 3. Validar sintaxis de cada docker-compose.yml.
      #    Usamos un .env vacío con las variables esperadas para que
      #    `docker compose config` no falle por interpolación.
      # ---------------------------------------------------------------
      - name: Validar sintaxis de cada docker-compose.yml
        run: |
          set -euo pipefail
          fail=0
          for svc in services/*/; do
            compose="${svc}docker-compose.yml"
            if [[ ! -f "${compose}" ]]; then
              continue
            fi
            echo "::group::Validando ${compose}"

            # Generar un .env temporal a partir del .env.example, con valores
            # placeholder para que `docker compose config` no rompa por
            # variables sin definir.
            example="${svc}.env.example"
            tmp_env="${svc}.env"
            if [[ -f "${example}" ]]; then
              awk -F= '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                /=/ {
                  # Si la línea tiene valor, dejarla tal cual.
                  if (length($2) > 0) { print; next }
                  # Si está vacía, ponerle un placeholder.
                  print $1 "=ci-placeholder"
                }
              ' "${example}" > "${tmp_env}"
            fi

            if ! ( cd "${svc}" && docker compose config -q ); then
              echo "::error::Compose inválido en ${compose}"
              fail=$((fail+1))
            fi

            # Limpiar el .env temporal para que el siguiente paso no lo confunda
            # con un .env real comiteado.
            [[ -f "${tmp_env}" ]] && rm -f "${tmp_env}"

            echo "::endgroup::"
          done
          if (( fail > 0 )); then
            exit 1
          fi
          echo "OK: todos los compose válidos."

      # ---------------------------------------------------------------
      # 4. Detectar secrets hardcodeados con valor literal.
      #    Busca patrones como password=abc123 o secret_key="literal".
      #    Excluye: archivos .example, líneas con ${, getenv, process.env,
      #    environ, y valores placeholder conocidos (changeme, ci-placeholder).
      # ---------------------------------------------------------------
      - name: Buscar secrets hardcodeados con valor literal
        run: |
          set -euo pipefail
          # Archivos a escanear: yml, sh, py, js, json (rastreados por git, excluye .example)
          mapfile -t files < <(
            git ls-files \
              -- '*.yml' '*.yaml' '*.sh' '*.py' '*.js' '*.json' \
              | grep -v '\.example$' || true
          )
          if (( ${#files[@]} == 0 )); then
            echo "OK: no hay ficheros a escanear."
            exit 0
          fi

          # Patrón: clave sensible seguida de = y un valor literal no vacío.
          # Excluimos interpolaciones (${}), referencias a env, y placeholders.
          leaks=()
          while IFS= read -r match; do
            leaks+=("${match}")
          done < <(
            grep -n \
              -E "(password|secret|token|api_key|apikey|private_key)\s*[=:]\s*['\"]?[A-Za-z0-9+/=_\-]{8,}['\"]?" \
              "${files[@]}" \
              | grep -v '\${\|getenv\|process\.env\|environ\[' \
              | grep -vi 'changeme\|ci-placeholder\|example\|your-\|placeholder\|<[A-Z_]\+>' \
              || true
          )

          if (( ${#leaks[@]} > 0 )); then
            echo "::error::Posibles secrets hardcodeados encontrados:"
            for l in "${leaks[@]}"; do
              echo "::error::  ${l}"
            done
            echo "::error::Mover los valores al .env real del NAS."
            exit 1
          fi
          echo "OK: no se detectaron secrets literales."

      # ---------------------------------------------------------------
      # 5. Lint de scripts shell con shellcheck.
      # ---------------------------------------------------------------
      - name: Instalar shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint de scripts/*.sh (shellcheck)
        run: |
          set -euo pipefail
          fail=0
          shopt -s nullglob
          for script in scripts/*.sh; do
            echo "::group::shellcheck ${script}"
            if ! shellcheck -x "${script}"; then
              fail=$((fail+1))
            fi
            echo "::endgroup::"
          done
          if (( fail > 0 )); then
            exit 1
          fi
          echo "OK: todos los scripts pasan shellcheck."
