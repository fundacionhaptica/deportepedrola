name: Validar repositorio

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Compose, secretos, scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # 1. Detectar .env reales comiteados accidentalmente.
      #    Solo se permiten .env.example.
      # ---------------------------------------------------------------
      - name: Verificar que no hay .env reales en el repo
        run: |
          set -euo pipefail
          mapfile -t leaks < <(git ls-files | grep -E '(^|/)\.env$|(^|/).+\.env$' | grep -v '\.env\.example$' || true)
          if (( ${#leaks[@]} > 0 )); then
            echo "::error::Se han encontrado ficheros .env reales en el repo:"
            for f in "${leaks[@]}"; do
              echo "::error::  - $f"
            done
            echo "::error::Mover los secretos al NAS y dejar solo .env.example aquí."
            exit 1
          fi
          echo "OK: no hay .env reales versionados."

      # ---------------------------------------------------------------
      # 2. Cada services/<x>/ debe tener un .env.example.
      # ---------------------------------------------------------------
      - name: Verificar que cada servicio tiene .env.example
        run: |
          set -euo pipefail
          missing=0
          for svc in services/*/; do
            if [[ ! -f "${svc}.env.example" ]]; then
              echo "::error::Falta .env.example en ${svc}"
              missing=$((missing+1))
            fi
          done
          if (( missing > 0 )); then
            exit 1
          fi
          echo "OK: todos los servicios tienen .env.example."

      # ---------------------------------------------------------------
      # 3. Validar sintaxis de cada docker-compose.yml.
      #    Usamos un .env vacío con las variables esperadas para que
      #    `docker compose config` no falle por interpolación.
      # ---------------------------------------------------------------
      - name: Validar sintaxis de cada docker-compose.yml
        run: |
          set -euo pipefail
          fail=0
          for svc in services/*/; do
            compose="${svc}docker-compose.yml"
            if [[ ! -f "${compose}" ]]; then
              continue
            fi
            echo "::group::Validando ${compose}"

            example="${svc}.env.example"
            tmp_env="${svc}.env"
            if [[ -f "${example}" ]]; then
              awk -F= '
                /^[[:space:]]*#/ || /^[[:space:]]*$/ { next }
                /=/ {
                  if (length($2) > 0) { print; next }
                  print $1 "=ci-placeholder"
                }
              ' "${example}" > "${tmp_env}"
            fi

            if ! ( cd "${svc}" && docker compose config -q ); then
              echo "::error::Compose inválido en ${compose}"
              fail=$((fail+1))
            fi

            [[ -f "${tmp_env}" ]] && rm -f "${tmp_env}"

            echo "::endgroup::"
          done
          if (( fail > 0 )); then
            exit 1
          fi
          echo "OK: todos los compose válidos."

      # ---------------------------------------------------------------
      # 4. Buscar secretos hardcodeados.
      #    Detecta password=/secret=/token= con valor literal.
      #    Excluye: .env.example, referencias a variables ($VAR, ${VAR}),
      #    y acceso a entorno en código (os.environ, process.env, getenv).
      # ---------------------------------------------------------------
      - name: Buscar secretos hardcodeados
        run: |
          set -euo pipefail

          mapfile -t files < <(git ls-files | grep -vE '(^|/)\.env\.example$')

          fails=0
          for f in "${files[@]}"; do
            [[ -f "${f}" ]] || continue
            # Saltar binarios conocidos
            [[ "${f}" =~ \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf|zip|tar|gz|lock)$ ]] && continue

            while IFS= read -r match; do
              # Saltar referencias a variables del shell/compose: ${VAR}, $VAR, $(cmd)
              [[ "${match}" =~ \$[\{\(] ]] && continue
              [[ "${match}" =~ \$[A-Za-z_] ]] && continue
              # Saltar acceso a entorno en lenguajes: os.environ, process.env, getenv, env[
              [[ "${match}" =~ [Ee]nviron|process\.env|getenv|env\[ ]] && continue
              # Saltar líneas de comentario (#, //, --)
              [[ "${match}" =~ ^[0-9]+:[[:space:]]*(#|//|--) ]] && continue
              # Saltar valores vacíos o solo espacios tras = o :
              [[ "${match}" =~ [=:][[:space:]]*$ ]] && continue
              # Saltar placeholders del CI generados en el paso anterior
              [[ "${match}" =~ ci-placeholder ]] && continue

              echo "::error::Posible secreto hardcodeado en ${f}: ${match}"
              fails=$((fails + 1))
            done < <(grep -niE '(password|secret|token)[[:space:]]*[=:][[:space:]]*\S' "${f}" 2>/dev/null || true)
          done

          if (( fails > 0 )); then
            exit 1
          fi
          echo "OK: no se detectaron secretos hardcodeados."

      # ---------------------------------------------------------------
      # 5. Lint de scripts shell con shellcheck.
      # ---------------------------------------------------------------
      - name: Instalar shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Lint de scripts/*.sh
        run: |
          set -euo pipefail
          fail=0
          shopt -s nullglob
          for script in scripts/*.sh; do
            echo "::group::shellcheck ${script}"
            if ! shellcheck -x "${script}"; then
              fail=$((fail+1))
            fi
            echo "::endgroup::"
          done
          if (( fail > 0 )); then
            exit 1
          fi
          echo "OK: todos los scripts pasan shellcheck."

      # ---------------------------------------------------------------
      # 6. Validar sintaxis Python (si hay .py en el repo).
      # ---------------------------------------------------------------
      - name: Validar sintaxis Python
        run: |
          set -euo pipefail
          mapfile -t pyfiles < <(git ls-files '*.py' || true)
          if (( ${#pyfiles[@]} == 0 )); then
            echo "Sin ficheros .py, saltando."
            exit 0
          fi
          fail=0
          for f in "${pyfiles[@]}"; do
            echo "::group::py_compile ${f}"
            if ! python3 -m py_compile "${f}"; then
              echo "::error::Sintaxis Python inválida en ${f}"
              fail=$((fail+1))
            fi
            echo "::endgroup::"
          done
          if (( fail > 0 )); then
            exit 1
          fi
          echo "OK: ${#pyfiles[@]} fichero(s) Python válidos."

      # ---------------------------------------------------------------
      # 7. Validar sintaxis JavaScript (si hay .js, excluir .min.js).
      # ---------------------------------------------------------------
      - name: Validar sintaxis JavaScript
        run: |
          set -euo pipefail
          mapfile -t jsfiles < <(git ls-files '*.js' | grep -v '\.min\.js$' || true)
          if (( ${#jsfiles[@]} == 0 )); then
            echo "Sin ficheros .js (no minificados), saltando."
            exit 0
          fi
          fail=0
          for f in "${jsfiles[@]}"; do
            echo "::group::node --check ${f}"
            if ! node --check "${f}"; then
              echo "::error::Sintaxis JavaScript inválida en ${f}"
              fail=$((fail+1))
            fi
            echo "::endgroup::"
          done
          if (( fail > 0 )); then
            exit 1
          fi
          echo "OK: ${#jsfiles[@]} fichero(s) JS válidos."
